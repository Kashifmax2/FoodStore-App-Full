<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Admin Setup — FoodStore</title><link rel="stylesheet" href="style.css"></head>
<body class="auth-body"><div id="spinner"><div class="spinner-ring"></div></div><div class="auth-card"><div class="auth-logo"><span class="logo-icon">👑</span><h1>Admin Setup</h1><p>Create the first admin account</p></div><p class="sub" style="margin-bottom:1.5rem;color:var(--warn)">⚠️ Use this page ONCE to create your admin account. Delete or protect it afterwards.</p><div class="form-group"><label>Admin Name</label><input type="text" id="name" class="form-control" placeholder="Admin Name" value="Admin"></div><div class="form-group"><label>Admin Email</label><input type="email" id="email" class="form-control" placeholder="admin@foodstore.com"></div><div class="form-group"><label>Password</label><input type="password" id="password" class="form-control" placeholder="Secure password"></div><button class="btn btn-primary btn-block" id="create-btn">👑 Create Admin Account</button></div>
<script type="module">import { auth, db } from "./firebase.js"; import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"; import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"; import { showToast, hideSpinner, showSpinner } from "./app.js"; hideSpinner(); document.getElementById("create-btn").addEventListener("click", async () => { const name = document.getElementById("name").value.trim(); const email = document.getElementById("email").value.trim(); const password = document.getElementById("password").value; if (!name || !email || !password) return showToast("Please fill all fields.", "error"); showSpinner(); try { const cred = await createUserWithEmailAndPassword(auth, email, password); await setDoc(doc(db, "users", cred.user.uid), { name, email, role: "admin", status: "active", createdAt: new Date().toISOString() }); hideSpinner(); showToast("Admin account created! Redirecting…", "success"); setTimeout(() => window.location.href = "admin.html", 1500); } catch (err) { hideSpinner(); showToast(err.message, "error"); } });</script></body></html>

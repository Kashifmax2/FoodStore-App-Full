<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FoodStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div id="spinner"><div class="spinner-ring"></div></div>
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-icon">🍔</span><h1>FoodStore</h1><p>Fresh flavors delivered fast</p></div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your account</p>
    <div class="form-group"><label>Email</label><input type="email" id="email" class="form-control" placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" class="form-control" placeholder="••••••••"></div>
    <button class="btn btn-primary btn-block" id="login-btn">Sign In</button>
    <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>
  <script type="module">
    import { handleLogin } from "./auth.js";
    import { hideSpinner } from "./app.js";
    hideSpinner();
    const btn = document.getElementById("login-btn");
    const email = document.getElementById("email");
    const pwd = document.getElementById("password");
    btn.onclick = () => {
      const e = email.value.trim();
      const p = pwd.value;
      if (!e || !p) import("./app.js").then(m => m.showToast("Fill all fields", "error"));
      else handleLogin(e, p);
    };
    document.addEventListener("keydown", e => e.key === "Enter" && btn.click());
  </script>
</body>
</html>

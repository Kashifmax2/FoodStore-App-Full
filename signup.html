<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — FoodStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div id="spinner"><div class="spinner-ring"></div></div>
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-icon">🍔</span><h1>FoodStore</h1><p>Fresh flavors delivered fast</p></div>
    <h2>Create account</h2>
    <p class="sub">Join thousands of food lovers</p>
    <div class="form-group"><label>Full Name</label><input type="text" id="name" class="form-control" placeholder="Jane Smith"></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" class="form-control" placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" class="form-control" placeholder="Min. 6 characters"></div>
    <div class="form-group"><label>I am a…</label>
      <div class="role-select">
        <input type="radio" name="role" id="role-user" value="user" checked><label for="role-user" class="role-label"><span class="role-emoji">👤</span>Customer</label>
        <input type="radio" name="role" id="role-chef" value="chef"><label for="role-chef" class="role-label"><span class="role-emoji">🧑‍🍳</span>Chef</label>
      </div>
    </div>
    <button class="btn btn-primary btn-block" id="signup-btn">Create Account</button>
    <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
  <script type="module">
    import { handleSignup } from "./auth.js";
    document.getElementById("signup-btn").onclick = () => {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const role = document.querySelector('input[name="role"]:checked').value;
      if (!name || !email || !password) import("./app.js").then(m => m.showToast("All fields required", "error"));
      else handleSignup(name, email, password, role);
    };
  </script>
</body>
</html>

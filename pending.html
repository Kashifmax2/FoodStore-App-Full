<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pending Approval — FoodStore</title><link rel="stylesheet" href="style.css"></head>
<body><div id="spinner"><div class="spinner-ring"></div></div><div class="status-page"><div class="icon">⏳</div><h2>Application Under Review</h2><p>Your chef application is being reviewed by our admin team. You'll be able to access the chef panel once approved. This usually takes less than 24 hours.</p><button class="btn btn-outline" id="logout-btn">Sign Out</button></div>
<script type="module">import { auth } from "./firebase.js"; import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"; import { handleLogout } from "./auth.js"; import { hideSpinner } from "./app.js"; onAuthStateChanged(auth, user => { if (!user) window.location.href = "login.html"; else hideSpinner(); }); document.getElementById("logout-btn").addEventListener("click", handleLogout);</script></body></html>
